<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inventaire des Contrôles UI</title>
    <style>
        body {
            background-color: #0f1117;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            padding: 40px;
        }
        h1 {
            color: #5a8fe0;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid #2e3248;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        /* Alignement sur une même ligne */
        .control-line {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 25px;
            background: #161926;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #2e3248;
        }
        .control-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        label {
            font-size: 0.65rem;
            color: #888;
            text-transform: uppercase;
        }
        input, select, button, textarea {
            accent-color: #5a8fe0; /* Couleur des curseurs/checkboxes */
        }
    </style>
</head>
<body>
    <h1>Console d'Éléments de Contrôle (UI Widgets)</h1>
    
    <div class="control-line">
        <div class="control-item">
            <label>Bouton</label>
            <button type="button">Action</button>
        </div>

        <div class="control-item">
            <label>Champ Texte</label>
            <input type="text" placeholder="Entrée..." style="width: 100px;">
        </div>

        <div class="control-item">
            <label>Curseur</label>
            <input type="range">
        </div>

        <div class="control-item">
            <label>Checkbox</label>
            <input type="checkbox">
        </div>

        <div class="control-item">
            <label>Radio</label>
            <input type="radio" checked>
        </div>

        <div class="control-item">
            <label>Menu</label>
            <select>
                <option>Option 1</option>
                <option>Option 2</option>
            </select>
        </div>

        <div class="control-item">
            <label>Couleur</label>
            <input type="color" value="#5a8fe0">
        </div>

        <div class="control-item">
            <label>Date</label>
            <input type="date">
        </div>

        <div class="control-item">
            <label>Nombre</label>
            <input type="number" style="width: 60px;">
        </div>

        <div class="control-item">
            <label>Fichier</label>
            <input type="file" style="width: 150px;">
        </div>

        <div class="control-item">
            <label>Zone Texte</label>
            <textarea rows="1" style="width: 80px;"></textarea>
        </div>
    </div>
</body>
</html>
